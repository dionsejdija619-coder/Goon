<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Meme Quiz</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 18px;
  cursor: pointer;
}

#box {
  margin-top: 15%;
}
</style>
</head>
<body>

<div id="box">
  <h2 id="question">Do you want to start the quiz?</h2>
  <div id="buttons"></div>
</div>

<script>
let step = 0;

function loadQuestion() {
  let q = document.getElementById("question");
  let b = document.getElementById("buttons");
  b.innerHTML = "";

  if (step === 0) {
    q.innerText = "Do you want to start the meme quiz?";
    addBtn("Yes", next);
    addBtn("No", next);
  }

  else if (step === 1) {
    q.innerText = "Do you like funny quizzes?";
    addBtn("Yes", next);
    addBtn("No", next);
  }

  else if (step === 2) {
    q.innerText = "How often do you use the internet?";
    addBtn("All the time", next);
    addBtn("Sometimes", next);
    addBtn("Rarely", next);
  }

  else if (step === 3) {
    q.innerText = "Do you enjoy memes?";
    addBtn("Yes", next);
    addBtn("No", next);
  }

  else {
    q.innerText = "🎉 Congratulations! You are officially in the Meme Club 😂";
  }
}

function addBtn(text, func) {
  let btn = document.createElement("button");
  btn.innerText = text;
  btn.onclick = func;
  document.getElementById("buttons").appendChild(btn);
}

function next() {
  step++;
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
