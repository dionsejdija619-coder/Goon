<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Better Flappy Bird</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            border: 4px solid #444;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }
        #instructions {
            position: absolute;
            top: 20px;
            color: #ddd;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 8px;
        }
        h2 { margin: 0 0 5px 0; }
        p { margin: 0; font-size: 14px;}
    </style>
</head>
<body>

    <div id="instructions">
        <h2>Flappy Bird</h2>
        <p><strong>SPACEBAR / CLICK</strong> to flap | <strong>Q</strong> to restart</p>
    </div>

    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let frames = 0;
        let score = 0;
        let gameOver = false;
        let bgOffset = 0;

        // Upgraded Bird Object
        const bird = {
            x: 80,
            y: 250,
            radius: 14,
            gravity: 0.6,    // Increased gravity (less floaty)
            jump: -7.5,      // Stronger, snappier jump
            velocity: 0,
            flapTimer: 0,    // Used to animate the wing
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Tilt the bird based on velocity (falling = tilt down, jumping = tilt up)
                let rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.velocity * 0.1)));
                ctx.rotate(rotation);

                // Draw Body
                ctx.fillStyle = "#FFD700"; // Yellow
                ctx.strokeStyle = "#000";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // Draw Eye
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(6, -5, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.fillStyle = "black";
                ctx.beginPath();
                ctx.arc(8, -5, 2, 0, Math.PI * 2); // Pupil
                ctx.fill();

                // Draw Beak
                ctx.fillStyle = "#FF8C00"; // Orange
                ctx.beginPath();
                ctx.moveTo(10, 2);
                ctx.lineTo(24, 6);
                ctx.lineTo(10, 10);
                ctx.fill();
                ctx.stroke();

                // Draw Wing (Animates based on flapTimer)
                ctx.fillStyle = "#FFF";
                ctx.beginPath();
                if (this.flapTimer > 0) {
                    // Wing UP (Flapping)
                    ctx.ellipse(-4, -6, 8, 5, Math.PI / 6, 0, Math.PI * 2);
                    this.flapTimer--;
                } else {
                    // Wing DOWN (Gliding/Falling)
                    ctx.ellipse(-4, 4, 8, 5, -Math.PI / 8, 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.stroke();

                ctx.restore();
            },
            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;
                
                // Hit the floor
                if (this.y + this.radius >= canvas.height - 40) { 
                    this.y = canvas.height - 40 - this.radius;
                    gameOver = true;
                }
                // Hit the ceiling
                if (this.y - this.radius <= 0) {
                    this.y = this.radius;
                    this.velocity = 0;
                }
            },
            flap() {
                this.velocity = this.jump;
                this.flapTimer = 10; // Keep wing up for 10 frames
            }
        };

        // Pipes array and settings
        let pipes = [];
        const pipeWidth = 60;
        const pipeGap = 140; // Gap for the bird to pass through

        function handlePipes() {
            if (frames % 90 === 0) {
                let topHeight = Math.random() * (canvas.height - pipeGap - 120) + 40;
                pipes.push({
                    x: canvas.width,
                    top: topHeight,
                    bottom: topHeight + pipeGap,
                    passed: false
                });
            }

            for (let i = 0; i < pipes.length; i++) {
                let p = pipes[i];
                p.x -= 2.5; // Game speed

                // Pipe Colors
                ctx.fillStyle = "#73BF2E";
                ctx.strokeStyle = "#558A22";
                ctx.lineWidth = 3;

                // Draw Top Pipe
                ctx.fillRect(p.x, 0, pipeWidth, p.top);
                ctx.strokeRect(p.x, 0, pipeWidth, p.top);
                // Top Pipe Cap
                ctx.fillRect(p.x - 4, p.top - 20, pipeWidth + 8, 20);
                ctx.strokeRect(p.x - 4, p.top - 20, pipeWidth + 8, 20);

                // Draw Bottom Pipe
                let bottomHeight = canvas.height - p.bottom - 40; // -40 for the ground
                ctx.fillRect(p.x, p.bottom, pipeWidth, bottomHeight);
                ctx.strokeRect(p.x, p.bottom, pipeWidth, bottomHeight);
                // Bottom Pipe Cap
                ctx.fillRect(p.x - 4, p.bottom, pipeWidth + 8, 20);
                ctx.strokeRect(p.x - 4, p.bottom, pipeWidth + 8, 20);

                // Collision Detection (taking bird radius into account)
                let birdLeft = bird.x - bird.radius + 2;
                let birdRight = bird.x + bird.radius - 2;
                let birdTop = bird.y - bird.radius + 2;
                let birdBottom = bird.y + bird.radius - 2;

                if (
                    birdRight > p.x && birdLeft < p.x + pipeWidth &&
                    (birdTop < p.top || birdBottom > p.bottom)
                ) {
                    gameOver = true;
                }

                // Increase score
                if (p.x + pipeWidth < bird.x && !p.passed) {
                    score++;
                    p.passed = true;
                }
            }

            // Remove off-screen pipes
            if (pipes.length > 0 && pipes[0].x < -pipeWidth - 10) {
                pipes.shift();
            }
        }

        // Draw Background (Sky, City, Ground)
        function drawBackground() {
            // Sky Gradient
            let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, "#4CB1F7");
            grad.addColorStop(1, "#A2E0FF");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Simple parallax cityscape
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            for(let i = 0; i < 5; i++) {
                let xPos = ((i * 150) - (bgOffset * 0.5)) % (canvas.width + 150);
                if (xPos < -150) xPos += canvas.width + 150;
                ctx.fillRect(xPos, canvas.height - 180, 80, 140);
                ctx.fillRect(xPos + 40, canvas.height - 220, 60, 180);
            }

            // Moving Ground
            bgOffset += 2.5; // Match pipe speed
            ctx.fillStyle = "#DED895"; // Dirt color
            ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
            
            ctx.fillStyle = "#73BF2E"; // Grass top
            ctx.fillRect(0, canvas.height - 40, canvas.width, 10);
            
            // Ground lines for movement effect
            ctx.fillStyle = "#C6BD66";
            for(let i = 0; i < 20; i++) {
                let lineX = ((i * 30) - bgOffset) % canvas.width;
                if (lineX < 0) lineX += canvas.width;
                ctx.fillRect(lineX, canvas.height - 25, 10, 5);
            }
        }

        function resetGame() {
            bird.y = 250;
            bird.velocity = 0;
            bird.flapTimer = 0;
            pipes = [];
            score = 0;
            frames = 0;
            gameOver = false;
            animate();
        }

        // Main game loop
        function animate() {
            drawBackground();

            if (gameOver) {
                // Draw everything one last time so it freezes on screen
                bird.draw();
                
                // Draw pipes frozen
                for (let i = 0; i < pipes.length; i++) {
                    let p = pipes[i];
                    ctx.fillStyle = "#73BF2E"; ctx.strokeStyle = "#558A22"; ctx.lineWidth = 3;
                    ctx.fillRect(p.x, 0, pipeWidth, p.top); ctx.strokeRect(p.x, 0, pipeWidth, p.top);
                    ctx.fillRect(p.x - 4, p.top - 20, pipeWidth + 8, 20); ctx.strokeRect(p.x - 4, p.top - 20, pipeWidth + 8, 20);
                    let bottomHeight = canvas.height - p.bottom - 40;
                    ctx.fillRect(p.x, p.bottom, pipeWidth, bottomHeight); ctx.strokeRect(p.x, p.bottom, pipeWidth, bottomHeight);
                    ctx.fillRect(p.x - 4, p.bottom, pipeWidth + 8, 20); ctx.strokeRect(p.x - 4, p.bottom, pipeWidth + 8, 20);
                }

                // Game Over Screen Overlay
                ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.font = "bold 40px 'Segoe UI'";
                ctx.fillText("Game Over", canvas.width/2, 220);
                ctx.font = "24px 'Segoe UI'";
                ctx.fillText("Score: " + score, canvas.width/2, 270);
                
                ctx.fillStyle = "#FFD700";
                ctx.font = "bold 20px 'Segoe UI'";
                ctx.fillText("Press 'Q' to Restart", canvas.width/2, 320);
                
                ctx.textAlign = "left"; // Reset for score drawing
                return; 
            }

            // Update and draw objects
            handlePipes();
            bird.update();
            bird.draw();

            // Draw huge background score
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            ctx.font = "bold 60px 'Segoe UI'";
            ctx.textAlign = "center";
            ctx.fillText(score, canvas.width / 2, 80);
            ctx.textAlign = "left";

            frames++;
            requestAnimationFrame(animate);
        }

        // Controls
        window.addEventListener("keydown", (e) => {
            if ((e.code === "Space" || e.code === "ArrowUp") && !gameOver) {
                bird.flap();
            }
            // Press Q to restart when game is over
            if ((e.key === "q" || e.key === "Q") && gameOver) {
                resetGame();
            }
        });
        
        window.addEventListener("mousedown", () => {
            if (!gameOver) bird.flap();
        });

        // Start
        animate();
    </script>
</body>
</html>
