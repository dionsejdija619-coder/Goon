<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Flip: Neon Rush</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #0b0c10;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; user-select: none;
        }
        #game-container {
            position: relative; width: 800px; height: 400px;
            box-shadow: 0 0 30px rgba(102, 252, 241, 0.3);
            border: 2px solid #45a29e; background-color: #1f2833;
        }
        canvas { display: block; }

        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(11, 12, 16, 0.9); color: #66fcf1;
            display: none; transition: opacity 0.3s;
        }
        .active { display: flex !important; }

        h1 { font-size: 48px; margin: 0 0 10px 0; text-transform: uppercase; text-shadow: 0 0 10px #66fcf1; }
        p { font-size: 18px; margin-bottom: 20px; color: #c5c6c7; }

        .hud {
            position: absolute; top: 15px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
            color: #c5c6c7; font-size: 20px; font-weight: bold; pointer-events: none;
            z-index: 10;
        }
        .hud-coins { color: #ffd700; text-shadow: 0 0 5px #ffd700; }

        button {
            background: transparent; color: #66fcf1; border: 2px solid #66fcf1;
            padding: 10px 25px; font-size: 18px; font-family: 'Courier New', monospace; font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: all 0.2s; margin: 5px;
        }
        button:hover { background: #66fcf1; color: #0b0c10; box-shadow: 0 0 15px rgba(102, 252, 241, 0.8); }
        
        .btn-shop { border-color: #ffd700; color: #ffd700; }
        .btn-shop:hover { background: #ffd700; color: #0b0c10; box-shadow: 0 0 15px rgba(255, 215, 0, 0.8); }

        /* Shop Grid */
        #shop-content {
            display: flex; gap: 30px; margin-bottom: 20px; width: 90%; justify-content: center;
        }
        .shop-column { display: flex; flex-direction: column; gap: 10px; flex: 1; }
        .shop-item {
            background: rgba(255, 255, 255, 0.05); border: 1px solid #45a29e;
            padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center;
        }
        .shop-item.equipped { border-color: #66fcf1; background: rgba(102, 252, 241, 0.1); }
        .buy-btn { font-size: 14px; padding: 5px 10px; margin: 0; }
        .buy-btn:disabled { background: #333; border-color: #555; color: #888; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="hud">
            <div>Score: <span id="scoreUI">0</span> <span style="font-size: 14px; color:#45a29e;">(Best: <span id="highScoreUI">0</span>)</span></div>
            <div class="hud-coins">🪙 <span id="coinUI">0</span></div>
        </div>

        <div id="start-screen" class="ui-layer active">
            <h1>Gravity Flip</h1>
            <p>Press SPACE or CLICK to flip gravity</p>
            <div>
                <button onclick="startGame()">Play</button>
                <button class="btn-shop" onclick="showShop()">Shop</button>
            </div>
        </div>

        <div id="shop-screen" class="ui-layer">
            <h2 style="color: #ffd700; text-shadow: 0 0 10px #ffd700; margin: 0 0 5px 0;">Neon Shop</h2>
            <p>Coins: <span id="shopCoinUI" style="color: #ffd700; font-weight: bold;">0</span></p>
            
            <div id="shop-content">
                <div class="shop-column" id="skins-list">
                    <h3 style="margin:0; text-align:center; color:#45a29e;">Skins</h3>
                    </div>
                <div class="shop-column" id="trails-list">
                    <h3 style="margin:0; text-align:center; color:#45a29e;">Trails</h3>
                    </div>
            </div>
            
            <button onclick="hideShop()">Back to Menu</button>
        </div>

        <div id="game-over-screen" class="ui-layer">
            <h1 style="color: #ff0055; text-shadow: 0 0 15px #ff0055;">Wasted</h1>
            <p>Score: <span id="finalScore">0</span> | Coins Collected: <span id="finalCoins">0</span></p>
            <div>
                <button onclick="resetGame()">Try Again (Space)</button>
                <button class="btn-shop" onclick="showMenu()">Menu</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // UI
        const screens = {
            start: document.getElementById("start-screen"),
            shop: document.getElementById("shop-screen"),
            gameOver: document.getElementById("game-over-screen")
        };
        const scoreUI = document.getElementById("scoreUI");
        const highScoreUI = document.getElementById("highScoreUI");
        const coinUI = document.getElementById("coinUI");
        const shopCoinUI = document.getElementById("shopCoinUI");

        // Save Data
        let totalCoins = parseInt(localStorage.getItem("gf_coins")) || 0;
        let highScore = parseInt(localStorage.getItem("gf_highscore")) || 0;
        let unlockedSkins = JSON.parse(localStorage.getItem("gf_skins")) || ["Cube"];
        let unlockedTrails = JSON.parse(localStorage.getItem("gf_trails")) || ["Basic"];
        let equippedSkin = localStorage.getItem("gf_eq_skin") || "Cube";
        let equippedTrail = localStorage.getItem("gf_eq_trail") || "Basic";

        highScoreUI.innerText = highScore;
        coinUI.innerText = totalCoins;

        // Shop Data
        const skinsData = {
            "Cube": { color: "#66fcf1", shape: "rect", cost: 0 },
            "Pink Orb": { color: "#ff00aa", shape: "circle", cost: 50 },
            "Gold Triangle": { color: "#ffd700", shape: "triangle", cost: 100 },
            "Toxic Ninja": { color: "#39ff14", shape: "rect", cost: 200 }
        };
        const trailsData = {
            "Basic": { cost: 0 },
            "Fire": { cost: 50 },
            "Rainbow": { cost: 150 },
            "Phantom": { cost: 200 }
        };

        function updateSave() {
            localStorage.setItem("gf_coins", totalCoins);
            localStorage.setItem("gf_skins", JSON.stringify(unlockedSkins));
            localStorage.setItem("gf_trails", JSON.stringify(unlockedTrails));
            localStorage.setItem("gf_eq_skin", equippedSkin);
            localStorage.setItem("gf_eq_trail", equippedTrail);
            coinUI.innerText = totalCoins;
            shopCoinUI.innerText = totalCoins;
        }

        // Game State
        let gameState = "START";
        let frames = 0; let score = 0; let runCoins = 0;
        let gameSpeed = 6, baseSpeed = 6;
        let obstacleTimer = 0, coinTimer = 0;

        const player = {
            x: 100, y: 350, size: 24, vy: 0, gravity: 1.3, isFlipped: false,
            
            update() {
                this.vy += this.isFlipped ? -this.gravity : this.gravity;
                this.y += this.vy;
                
                if (this.y + this.size > canvas.height - 20) { this.y = canvas.height - 20 - this.size; this.vy = 0; }
                if (this.y < 20) { this.y = 20; this.vy = 0; }
            },
            
            draw() {
                let skin = skinsData[equippedSkin];
                ctx.fillStyle = skin.color;
                ctx.shadowBlur = 15; ctx.shadowColor = skin.color;
                
                if (skin.shape === "rect") {
                    ctx.fillRect(this.x, this.y, this.size, this.size);
                } else if (skin.shape === "circle") {
                    ctx.beginPath();
                    ctx.arc(this.x + this.size/2, this.y + this.size/2, this.size/2, 0, Math.PI*2);
                    ctx.fill();
                } else if (skin.shape === "triangle") {
                    ctx.beginPath();
                    if (this.isFlipped) {
                        ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + this.size, this.y); ctx.lineTo(this.x + this.size/2, this.y + this.size);
                    } else {
                        ctx.moveTo(this.x + this.size/2, this.y); ctx.lineTo(this.x + this.size, this.y + this.size); ctx.lineTo(this.x, this.y + this.size);
                    }
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            },

            flip() {
                this.isFlipped = !this.isFlipped;
                this.vy = this.isFlipped ? -5 : 5;
                spawnParticles(this.x + this.size/2, this.y + this.size/2, 10, skinsData[equippedSkin].color);
            }
        };

        let entities = []; // Obstacles and Coins
        let particles = [];

        function spawnParticles(x, y, amount, color) {
            for (let i = 0; i < amount; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
                    life: 1, color: color
                });
            }
        }

        class Coin {
            constructor() {
                this.type = "coin";
                this.size = 16;
                this.x = canvas.width;
                this.y = 40 + Math.random() * (canvas.height - 80); // Random height
                this.passed = false;
                this.pulse = 0;
            }
            update() { this.x -= gameSpeed; this.pulse += 0.1; }
            draw() {
                let scale = 1 + Math.sin(this.pulse) * 0.2;
                ctx.fillStyle = "#ffd700";
                ctx.shadowBlur = 10; ctx.shadowColor = "#ffd700";
                ctx.beginPath();
                ctx.arc(this.x + this.size/2, this.y + this.size/2, (this.size/2) * scale, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Obstacle {
            constructor() {
                this.type = "obs";
                this.width = 30 + Math.random() * 30;
                this.x = canvas.width;
                this.passed = false;
                
                // Difficulty logic
                let r = Math.random();
                if (gameSpeed > 7.5 && r < 0.2) {
                    // Moving Obstacle
                    this.height = 80;
                    this.y = canvas.height/2;
                    this.moving = true;
                    this.dir = Math.random() > 0.5 ? 1 : -1;
                } else if (gameSpeed > 6.5 && r < 0.4) {
                    // Middle float
                    this.height = 100;
                    this.y = (canvas.height / 2) - 50;
                    this.moving = false;
                } else {
                    // Standard Top/Bottom
                    this.height = 40 + Math.random() * 80;
                    this.isTop = Math.random() > 0.5;
                    this.y = this.isTop ? 20 : canvas.height - 20 - this.height;
                    this.moving = false;
                }
            }

            update() {
                this.x -= gameSpeed;
                if (this.moving) {
                    this.y += this.dir * 3;
                    if (this.y < 20 || this.y + this.height > canvas.height - 20) this.dir *= -1;
                }
            }

            draw() {
                ctx.fillStyle = "#ff0055";
                ctx.shadowBlur = 15; ctx.shadowColor = "#ff0055";
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0;
            }
        }

        // --- SHOP LOGIC ---
        function showMenu() { gameState = "START"; screens.gameOver.classList.remove("active"); screens.start.classList.add("active"); }
        function showShop() { 
            gameState = "SHOP"; screens.start.classList.remove("active"); screens.shop.classList.add("active"); 
            shopCoinUI.innerText = totalCoins; renderShop(); 
        }
        function hideShop() { gameState = "START"; screens.shop.classList.remove("active"); screens.start.classList.add("active"); }

        function renderShop() {
            const renderList = (data, unlocked, equipped, containerId, category) => {
                let html = "";
                for (let key in data) {
                    let item = data[key];
                    let isEquipped = equipped === key;
                    let isUnlocked = unlocked.includes(key);
                    
                    let btn = isEquipped ? `<button class="buy-btn" disabled>Equipped</button>` :
                              isUnlocked ? `<button class="buy-btn" onclick="equipItem('${category}', '${key}')">Equip</button>` :
                              `<button class="buy-btn" ${totalCoins >= item.cost ? '' : 'disabled'} onclick="buyItem('${category}', '${key}', ${item.cost})">${item.cost} 🪙</button>`;
                    
                    let style = category === 'skins' ? `color: ${item.color}; font-weight: bold;` : `color: #fff;`;
                    html += `<div class="shop-item ${isEquipped ? 'equipped' : ''}"><span style="${style}">${key}</span>${btn}</div>`;
                }
                document.getElementById(containerId).innerHTML = html;
            };
            renderList(skinsData, unlockedSkins, equippedSkin, "skins-list", "skins");
            renderList(trailsData, unlockedTrails, equippedTrail, "trails-list", "trails");
        }

        function buyItem(category, key, cost) {
            if (totalCoins >= cost) {
                totalCoins -= cost;
                if (category === 'skins') { unlockedSkins.push(key); equippedSkin = key; } 
                else { unlockedTrails.push(key); equippedTrail = key; }
                updateSave(); renderShop();
            }
        }
        function equipItem(category, key) {
            if (category === 'skins') equippedSkin = key; else equippedTrail = key;
            updateSave(); renderShop();
        }

        // --- GAME LOOP ---
        function startGame() { screens.start.classList.remove("active"); resetGameVariables(); }
        function resetGame() { screens.gameOver.classList.remove("active"); resetGameVariables(); }

        function resetGameVariables() {
            gameState = "PLAYING"; player.y = 350; player.vy = 0; player.isFlipped = false;
            entities = []; particles = []; score = 0; runCoins = 0; frames = 0;
            gameSpeed = baseSpeed; obstacleTimer = 0; coinTimer = 60;
            scoreUI.innerText = score; updateSave();
        }

        function die() {
            gameState = "GAMEOVER";
            spawnParticles(player.x + player.size/2, player.y + player.size/2, 50, skinsData[equippedSkin].color);
            if (score > highScore) { highScore = score; localStorage.setItem("gf_highscore", highScore); highScoreUI.innerText = highScore; }
            document.getElementById("finalScore").innerText = score;
            document.getElementById("finalCoins").innerText = runCoins;
            totalCoins += runCoins; updateSave();
            setTimeout(() => screens.gameOver.classList.add("active"), 1000);
        }

        function spawnTrail() {
            if (frames % 2 !== 0) return;
            let color = skinsData[equippedSkin].color;
            if (equippedTrail === "Fire") {
                let colors = ["#ff0000", "#ff7700", "#ffff00"];
                color = colors[Math.floor(Math.random() * colors.length)];
            } else if (equippedTrail === "Rainbow") {
                color = `hsl(${frames % 360}, 100%, 50%)`;
            }
            
            particles.push({
                x: player.x + player.size/2, y: player.y + (player.isFlipped ? 0 : player.size),
                vx: -gameSpeed * 0.5, vy: (Math.random() - 0.5),
                life: equippedTrail === "Phantom" ? 0.3 : 1, color: color
            });
        }

        function animate() {
            ctx.fillStyle = "#1f2833"; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Floors
            ctx.fillStyle = "#0b0c10"; ctx.fillRect(0, 0, canvas.width, 20); ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            ctx.fillStyle = "#45a29e"; ctx.fillRect(0, 18, canvas.width, 2); ctx.fillRect(0, canvas.height - 20, canvas.width, 2);

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.05;
                if (p.life <= 0) particles.splice(i, 1);
                else { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); ctx.globalAlpha = 1.0; }
            }

            if (gameState === "PLAYING") {
                player.update(); spawnTrail();

                // Spawners
                obstacleTimer--; coinTimer--;
                if (obstacleTimer <= 0) {
                    entities.push(new Obstacle());
                    obstacleTimer = Math.max(30, 80 - (gameSpeed * 2));
                }
                if (coinTimer <= 0) {
                    entities.push(new Coin());
                    coinTimer = 60 + Math.random() * 60;
                }

                for (let i = entities.length - 1; i >= 0; i--) {
                    let ent = entities[i];
                    ent.update(); ent.draw();

                    // Collision
                    let pRight = player.x + player.size, pBottom = player.y + player.size;
                    let eRight = ent.x + (ent.width || ent.size), eBottom = ent.y + (ent.height || ent.size);

                    if (player.x < eRight && pRight > ent.x && player.y < eBottom && pBottom > ent.y) {
                        if (ent.type === "obs") die();
                        else if (ent.type === "coin") {
                            runCoins++; coinUI.innerText = totalCoins + runCoins;
                            spawnParticles(ent.x, ent.y, 15, "#ffd700");
                            entities.splice(i, 1); continue;
                        }
                    }

                    // Score
                    if (ent.type === "obs" && ent.x + ent.width < player.x && !ent.passed) {
                        score += 10; scoreUI.innerText = score; ent.passed = true;
                        gameSpeed += 0.03;
                    }
                    if (ent.x + (ent.width || ent.size) < 0) entities.splice(i, 1);
                }
                frames++;
            } else if (gameState === "GAMEOVER") {
                entities.forEach(e => e.draw());
            }

            if (gameState !== "GAMEOVER" || particles.length > 0) {
                if (gameState !== "GAMEOVER") player.draw();
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                e.preventDefault();
                if (gameState === "PLAYING") player.flip();
                else if (gameState === "START") startGame();
                else if (gameState === "GAMEOVER" && screens.gameOver.classList.contains("active")) resetGame();
            }
        });
        window.addEventListener("mousedown", (e) => {
            if (gameState === "PLAYING" && e.target === canvas) player.flip();
        });

        animate();
    </script>
</body>
</html>
