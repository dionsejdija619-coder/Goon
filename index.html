<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Clone</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #333;
            font-family: Arial, sans-serif;
        }
        canvas {
            background-color: #70c5ce; /* Sky blue background */
            border: 2px solid #000;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        #instructions {
            position: absolute;
            top: 20px;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="instructions">
        <h2>Flappy Bird Clone</h2>
        <p>Press <strong>SPACEBAR</strong> or <strong>CLICK</strong> to flap!</p>
    </div>

    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let frames = 0;
        let score = 0;
        let gameOver = false;

        // Bird object
        const bird = {
            x: 50,
            y: 150,
            width: 20,
            height: 20,
            gravity: 0.35,
            jump: -6,
            velocity: 0,
            draw() {
                ctx.fillStyle = "yellow";
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                // Add a little eye
                ctx.fillStyle = "black";
                ctx.fillRect(this.x + 12, this.y + 4, 4, 4);
            },
            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;
                
                // Hit the floor or ceiling
                if (this.y + this.height >= canvas.height || this.y <= 0) {
                    gameOver = true;
                }
            },
            flap() {
                this.velocity = this.jump;
            }
        };

        // Pipes array and settings
        const pipes = [];
        const pipeWidth = 50;
        const pipeGap = 130;

        function handlePipes() {
            // Add a new pipe every 100 frames
            if (frames % 100 === 0) {
                let topHeight = Math.random() * (canvas.height - pipeGap - 60) + 30;
                pipes.push({
                    x: canvas.width,
                    top: topHeight,
                    bottom: topHeight + pipeGap
                });
            }

            for (let i = 0; i < pipes.length; i++) {
                let p = pipes[i];
                p.x -= 2; // Pipe speed

                ctx.fillStyle = "green";
                // Draw top pipe
                ctx.fillRect(p.x, 0, pipeWidth, p.top);
                // Draw bottom pipe
                ctx.fillRect(p.x, p.bottom, pipeWidth, canvas.height - p.bottom);

                // Collision detection
                if (
                    bird.x < p.x + pipeWidth &&
                    bird.x + bird.width > p.x &&
                    (bird.y < p.top || bird.y + bird.height > p.bottom)
                ) {
                    gameOver = true;
                }

                // Increase score when passing a pipe safely
                if (p.x === bird.x) {
                    score++;
                }
            }

            // Remove pipes that have gone off-screen
            if (pipes.length > 0 && pipes[0].x < -pipeWidth) {
                pipes.shift();
            }
        }

        // Main game loop
        function animate() {
            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                ctx.fillText("Game Over", 100, 240);
                ctx.font = "20px Arial";
                ctx.fillText("Final Score: " + score, 135, 280);
                ctx.fillText("Refresh to restart", 125, 320);
                return; // Stop animation
            }

            // Clear the canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update and draw objects
            bird.update();
            bird.draw();
            handlePipes();

            // Draw score
            ctx.fillStyle = "white";
            ctx.font = "30px Arial";
            ctx.fillText(score, 190, 40);

            frames++;
            requestAnimationFrame(animate);
        }

        // Event listeners for jumping
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") bird.flap();
        });
        window.addEventListener("mousedown", () => {
            bird.flap();
        });

        // Start the game
        animate();
    </script>
</body>
</html>
