<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiju City Destroyer</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #050505; font-family: 'Press Start 2P', monospace; overflow: hidden; user-select: none; }
        #game-container { position: relative; width: 800px; height: 400px; border: 4px solid #444; background-color: #111; box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); }
        canvas { display: block; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.85); color: #fff; display: none; z-index: 10; }
        .active { display: flex !important; }
        
        h1 { font-size: 36px; margin: 0 0 15px 0; color: #fff; text-shadow: 4px 4px 0 #E52521, -2px -2px 0 #555; text-align: center; line-height: 1.4; }
        p { font-size: 12px; margin-bottom: 25px; color: #aaa; text-align: center; line-height: 1.5; }
        
        .hud { position: absolute; top: 15px; left: 20px; right: 20px; display: flex; justify-content: space-between; color: #fff; font-size: 14px; pointer-events: none; z-index: 5; text-shadow: 2px 2px 0 #000; }
        .hud-coins { color: #F6D305; font-size: 16px; }
        
        button { background: #000; color: #fff; border: 4px solid #fff; padding: 12px 18px; font-size: 14px; font-family: 'Press Start 2P', monospace; cursor: pointer; text-transform: uppercase; margin: 10px; box-shadow: 4px 4px 0 #555; transition: 0.1s; }
        button:hover { background: #fff; color: #000; box-shadow: 4px 4px 0 #E52521; transform: translateY(-2px); }
        .btn-shop { border-color: #F6D305; color: #F6D305; box-shadow: 4px 4px 0 #A88F00; }
        .btn-shop:hover { background: #F6D305; color: #000; }
        
        #shop-content { display: flex; gap: 20px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; width: 90%; }
        .shop-item { background: #111; border: 4px solid #555; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; font-size: 12px; width: 180px; }
        .shop-item.equipped { border-color: #39ff14; background: #222; }
        .buy-btn { font-size: 10px; padding: 8px 12px; margin: 0; }
        
        #controls-hint { position: absolute; bottom: 10px; left: 0; width: 100%; text-align: center; color: #aaa; font-size: 10px; opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="hud" id="game-hud" style="display:none;">
            <div>DESTRUCTION: <span id="scoreUI">0</span>%</div>
            <div class="hud-coins">COINS: <span id="coinUI">0</span></div>
        </div>

        <div id="start-screen" class="ui-layer active">
            <h1>KAIJU CITY<br>DESTROYER</h1>
            <p>Total Coins Mined: <span id="totalCoinsUI" style="color:#F6D305;">0</span></p>
            <div>
                <button onclick="startGame()">START RAMPAGE</button>
                <button class="btn-shop" onclick="showShop()">DNA SHOP</button>
            </div>
            <div id="controls-hint">ARROWS = WALK | SPACE = ATOMIC BREATH</div>
        </div>

        <div id="shop-screen" class="ui-layer">
            <h2 style="color: #F6D305; margin: 0 0 15px 0;">DNA LAB (SHOP)</h2>
            <p style="color: #F6D305;">COINS: <span id="shopCoinUI">0</span></p>
            <div id="shop-content"></div>
            <button onclick="showMenu()">BACK TO MENU</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
        const screens = { start: document.getElementById("start-screen"), shop: document.getElementById("shop-screen") };
        const hud = document.getElementById("game-hud");
        
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function playTone(freq, type, duration, vol=0.1, slideFreq=null) {
            if (!audioCtx) return; let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        
        const sfx = {
            stomp: () => playTone(50, 'square', 0.3, 0.2, 20),
            beam: () => playTone(400, 'sawtooth', 0.5, 0.1, 800),
            crumble: () => { playTone(100, 'sawtooth', 0.4, 0.2, 50); setTimeout(() => playTone(80, 'square', 0.3, 0.2, 30), 100); },
            coin: () => playTone(1200, 'square', 0.1, 0.05, 1600)
        };

        // Saving / Loading
        let totalCoins = parseInt(localStorage.getItem("kaiju_coins")) || 0;
        let unlockedKaijus = JSON.parse(localStorage.getItem("kaiju_unlocked")) || ["Gojira 1954"];
        let equippedKaiju = localStorage.getItem("kaiju_equipped") || "Gojira 1954";

        function updateSave() {
            localStorage.setItem("kaiju_coins", totalCoins);
            localStorage.setItem("kaiju_unlocked", JSON.stringify(unlockedKaijus));
            localStorage.setItem("kaiju_equipped", equippedKaiju);
            document.getElementById("totalCoinsUI").innerText = totalCoins;
            document.getElementById("shopCoinUI").innerText = totalCoins;
            document.getElementById("coinUI").innerText = runCoins;
        }

        // Kaiju Database
        const kaijuDex = {
            "Gojira 1954": { cost: 0, color: "#3a3a3a", accent: "#111", beamColor: "#ffffff", speed: 2, power: 1, type: "classic" },
            "Mecha-Gojira": { cost: 250, color: "#a0a0a0", accent: "#ffcc00", beamColor: "#ff0000", speed: 3.5, power: 1.5, type: "mech" },
            "Shin Gojira": { cost: 600, color: "#2b0a0a", accent: "#ff0000", beamColor: "#cc00ff", speed: 1.5, power: 3, type: "shin" }
        };

        let gameState = "MENU"; 
        let frames = 0, cameraX = 0, runCoins = 0, destructionScore = 0;
        let keys = { ArrowLeft: false, ArrowRight: false, Space: false };
        let buildings = [], particles = [], clouds = [];

        // Player Object
        const player = {
            x: 100, y: 310, width: 60, height: 80, isFiring: false, fireCooldown: 0, frameCount: 0, facingRight: true,
            draw() {
                let stats = kaijuDex[equippedKaiju];
                ctx.save();
                ctx.translate(this.x, this.y);
                if (!this.facingRight) { ctx.scale(-1, 1); ctx.translate(-this.width, 0); }
                
                let bob = (keys.ArrowLeft || keys.ArrowRight) ? Math.sin(this.frameCount * 0.2) * 3 : 0;
                
                // Draw Tail
                ctx.fillStyle = stats.color;
                ctx.fillRect(-30, 50 + bob, 40, 20); // Base tail
                ctx.fillRect(-50, 60 + bob, 20, 10); // Mid tail
                ctx.fillRect(-60, 65 + bob, 10, 5);  // Tip

                // Shin Gojira has a massive tail
                if (stats.type === "shin") {
                    ctx.fillStyle = stats.accent;
                    ctx.fillRect(-70, 40 + bob, 15, 30);
                }

                // Legs
                let legBob1 = (keys.ArrowLeft || keys.ArrowRight) ? Math.sin(this.frameCount * 0.2) * 5 : 0;
                let legBob2 = (keys.ArrowLeft || keys.ArrowRight) ? Math.cos(this.frameCount * 0.2) * 5 : 0;
                ctx.fillStyle = stats.accent;
                ctx.fillRect(10, 60 + legBob1, 20, 20); // Front leg
                ctx.fillRect(30, 60 + legBob2, 20, 20); // Back leg
                
                // Body
                ctx.fillStyle = stats.color;
                let lean = this.isFiring ? 5 : 0; // Lean forward when breathing fire
                ctx.fillRect(10 + lean, 20 + bob, 40, 50); 
                
                // Chest / Details
                ctx.fillStyle = stats.accent;
                if (stats.type === "mech") {
                    ctx.fillRect(30 + lean, 30 + bob, 15, 20); // Metal chest plate
                    ctx.fillStyle = "#fff"; ctx.fillRect(15 + lean, 70 + legBob1, 10, 10); // Mech feet toes
                }

                // Dorsal Plates (Spikes)
                ctx.fillStyle = this.isFiring ? stats.beamColor : (stats.type === "shin" ? stats.accent : "#555");
                ctx.beginPath(); ctx.moveTo(10 + lean, 20 + bob); ctx.lineTo(-10 + lean, 30 + bob); ctx.lineTo(10 + lean, 40 + bob); ctx.fill();
                ctx.beginPath(); ctx.moveTo(10 + lean, 35 + bob); ctx.lineTo(-15 + lean, 45 + bob); ctx.lineTo(10 + lean, 55 + bob); ctx.fill();
                ctx.beginPath(); ctx.moveTo(10 + lean, 50 + bob); ctx.lineTo(-5 + lean, 60 + bob); ctx.lineTo(10 + lean, 65 + bob); ctx.fill();

                // Head
                ctx.fillStyle = stats.color;
                ctx.fillRect(30 + lean, bob, 30, 25); // Head block
                ctx.fillStyle = stats.type === "mech" ? "#ff0000" : (stats.type === "shin" ? "#fff" : "#fff"); // Eye color
                ctx.fillRect(45 + lean, 5 + bob, 5, 5); // Eye

                // Atomic Breath
                if (this.isFiring) {
                    ctx.globalAlpha = 0.8 + Math.random() * 0.2;
                    ctx.fillStyle = stats.beamColor;
                    
                    // Shin fires a thin laser, others fire a cone
                    if (stats.type === "shin") {
                        ctx.fillRect(60 + lean, 10 + bob, 800, 4);
                        ctx.globalAlpha = 0.4;
                        ctx.fillRect(60 + lean, 8 + bob, 800, 8);
                    } else {
                        ctx.beginPath();
                        ctx.moveTo(60 + lean, 10 + bob);
                        ctx.lineTo(800, -50 + bob + Math.random()*20);
                        ctx.lineTo(800, 50 + bob + Math.random()*20);
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1.0;
                }
                
                ctx.restore();
            },
            update() {
                let stats = kaijuDex[equippedKaiju];
                if (keys.ArrowRight) { this.x += stats.speed; this.facingRight = true; this.frameCount++; }
                if (keys.ArrowLeft) { this.x -= stats.speed; this.facingRight = false; this.frameCount++; }
                
                // Stomp sound logic
                if ((keys.ArrowLeft || keys.ArrowRight) && this.frameCount % 20 === 0) sfx.stomp();

                // Fire logic
                if (keys.Space && this.fireCooldown <= 0) {
                    this.isFiring = true; this.fireCooldown = 5; sfx.beam();
                    checkDestruction(this.facingRight);
                } else if (this.fireCooldown > 0) {
                    this.fireCooldown--;
                } else {
                    this.isFiring = false;
                }

                // Camera Follow constraint (keep player center-left)
                if (this.x - cameraX > 400) cameraX = this.x - 400;
                if (this.x - cameraX < 50) this.x = cameraX + 50; 
            }
        };

        class Building {
            constructor(x) {
                this.x = x; this.width = 60 + Math.random() * 80; this.height = 100 + Math.random() * 150;
                this.y = 390 - this.height; this.maxHp = (this.width * this.height) / 100; this.hp = this.maxHp;
                this.color = ["#222", "#2a2a35", "#332222"][Math.floor(Math.random()*3)];
                this.windows = [];
                for(let i=0; i<5; i++) {
                    for(let j=0; j<8; j++) {
                        if (Math.random() > 0.3) this.windows.push({ wx: i*15 + 5, wy: j*15 + 10, on: Math.random()>0.5 });
                    }
                }
            }
            draw() {
                if (this.hp <= 0) return;
                let damageRatio = this.hp / this.maxHp;
                
                ctx.save(); ctx.translate(this.x - cameraX, this.y + (this.height * (1-damageRatio))); 
                
                // Flash white when hit
                if (this.hitTimer > 0) { ctx.fillStyle = "#fff"; this.hitTimer--; } 
                else ctx.fillStyle = this.color;
                
                ctx.fillRect(0, 0, this.width, this.height * damageRatio);
                
                ctx.fillStyle = "#ffffaa";
                this.windows.forEach(w => {
                    if (w.on && w.wy < this.height * damageRatio - 10) {
                        ctx.globalAlpha = (this.hitTimer > 0) ? 0 : 0.8;
                        ctx.fillRect(w.wx, w.wy, 8, 8);
                    }
                });
                
                ctx.restore();
            }
        }

        function checkDestruction(facingRight) {
            let stats = kaijuDex[equippedKaiju];
            let beamRange = 500;
            
            buildings.forEach(b => {
                if (b.hp > 0) {
                    // Check if building is in front of Kaiju
                    let inRange = false;
                    if (facingRight && b.x > player.x && b.x < player.x + beamRange) inRange = true;
                    if (!facingRight && b.x + b.width < player.x && b.x > player.x - beamRange) inRange = true;

                    if (inRange) {
                        b.hp -= stats.power;
                        b.hitTimer = 2;
                        spawnParticles(b.x - cameraX + b.width/2, b.y + b.height/2, stats.beamColor, 2);
                        
                        if (b.hp <= 0) {
                            sfx.crumble();
                            spawnParticles(b.x - cameraX + b.width/2, b.y + b.height, "#555", 30);
                            destructionScore += 1;
                            document.getElementById("scoreUI").innerText = destructionScore;
                            
                            // Spawn coins based on building size
                            let coinsToSpawn = Math.floor(b.maxHp / 20) + 1;
                            for(let i=0; i<coinsToSpawn; i++) spawnCoin(b.x - cameraX + b.width/2);
                        }
                    }
                }
            });
        }

        class Coin {
            constructor(x) { this.x = x; this.y = 370 - Math.random()*50; this.vy = -5 - Math.random()*5; this.vx = (Math.random()-0.5)*10; this.life = 200; }
            update() { 
                this.vy += 0.5; this.y += this.vy; this.x += this.vx; 
                if (this.y > 370) { this.y = 370; this.vy *= -0.5; this.vx *= 0.8; }
                this.life--;
                
                // Magnet to player
                let px = player.x - cameraX + player.width/2; let py = player.y + player.height/2;
                let dx = px - this.x; let dy = py - this.y;
                if (Math.sqrt(dx*dx + dy*dy) < 80) { this.x += dx*0.1; this.y += dy*0.1; }
                
                // Collect
                if (Math.sqrt(dx*dx + dy*dy) < 30 && this.life > 0) {
                    this.life = 0; runCoins++; sfx.coin();
                    document.getElementById("coinUI").innerText = runCoins;
                }
            }
            draw() {
                if (this.life <= 0) return;
                ctx.fillStyle = (frames % 10 < 5) ? "#F6D305" : "#fff";
                ctx.beginPath(); ctx.arc(this.x, this.y, 6, 0, Math.PI*2); ctx.fill();
            }
        }
        let activeCoins = [];
        function spawnCoin(x) { activeCoins.push(new Coin(x)); }

        function spawnParticles(x, y, color, amount) {
            for (let i = 0; i < amount; i++) {
                particles.push({ x: x, y: y, size: 4 + Math.random()*6, vx: (Math.random()-0.5)*15, vy: (Math.random()-1)*10, life: 1, color: color });
            }
        }

        function generateCity() {
            let lastX = 200;
            for(let i=0; i<50; i++) {
                buildings.push(new Building(lastX));
                lastX += 80 + Math.random()*150;
            }
        }

        function generateClouds() {
            for(let i=0; i<15; i++) {
                clouds.push({ x: Math.random()*1000, y: 20 + Math.random()*100, speed: 0.1 + Math.random()*0.3, size: 30 + Math.random()*50 });
            }
        }

        // Screen Management
        function hideScreens() { Object.values(screens).forEach(s => s.classList.remove("active")); hud.style.display = "none"; }
        function showMenu() { initAudio(); updateSave(); gameState = "MENU"; hideScreens(); screens.start.classList.add("active"); }
        function showShop() { hideScreens(); screens.shop.classList.add("active"); renderShop(); }

        function renderShop() {
            let html = "";
            for (let k in kaijuDex) {
                let d = kaijuDex[k];
                let isUn = unlockedKaijus.includes(k);
                let isEq = equippedKaiju === k;
                let btn = isEq ? `<button class="buy-btn" disabled style="background:#39ff14;color:#000;">MUTATED</button>` : 
                          isUn ? `<button class="buy-btn" onclick="equip('${k}')">SELECT</button>` : 
                          `<button class="buy-btn" ${totalCoins >= d.cost ? '' : 'disabled'} onclick="buy('${k}', ${d.cost})">INJECT ${d.cost}C</button>`;
                
                html += `<div class="shop-item ${isEq ? 'equipped' : ''}">
                            <div style="font-size:14px; color:${d.beamColor}; text-align:center;">${k}</div>
                            <div style="width:40px;height:40px;background:${d.color}; border:2px solid ${d.accent};"></div>
                            <div style="font-size:8px; color:#aaa;">POW: ${d.power} | SPD: ${d.speed}</div>
                            ${btn}
                         </div>`;
            }
            document.getElementById("shop-content").innerHTML = html;
        }

        function buy(k, cost) { if(totalCoins >= cost) { totalCoins -= cost; unlockedKaijus.push(k); equippedKaiju = k; updateSave(); renderShop(); sfx.coin(); } }
        function equip(k) { equippedKaiju = k; updateSave(); renderShop(); }

        function startGame() {
            initAudio(); hideScreens(); hud.style.display = "flex"; gameState = "PLAYING";
            player.x = 100; player.y = 310; cameraX = 0; frames = 0; runCoins = 0; destructionScore = 0;
            buildings = []; particles = []; activeCoins = []; clouds = [];
            generateCity(); generateClouds();
            document.getElementById("scoreUI").innerText = "0"; document.getElementById("coinUI").innerText = "0";
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.vy += 0.5; p.y += p.vy; p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
                else { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); ctx.globalAlpha = 1.0; }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Night Sky Background
            ctx.fillStyle = "#0a0a1a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw Moon
            ctx.fillStyle = "#ffffee"; ctx.beginPath(); ctx.arc(600 - (cameraX*0.05), 100, 40, 0, Math.PI*2); ctx.fill();

            // Draw Clouds (Parallax)
            ctx.fillStyle = "#222"; ctx.globalAlpha = 0.5;
            clouds.forEach(c => {
                c.x -= c.speed; if (c.x < -200) c.x = canvas.width + 100;
                ctx.beginPath(); ctx.arc(c.x - (cameraX*0.1), c.y, c.size, 0, Math.PI*2); ctx.arc(c.x+c.size*0.8 - (cameraX*0.1), c.y+10, c.size*0.7, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            if (gameState === "PLAYING") {
                player.update();
                
                // Endless City Generation
                if (buildings[buildings.length-1].x - cameraX < 800) {
                    buildings.push(new Building(buildings[buildings.length-1].x + 80 + Math.random()*150));
                }

                buildings.forEach(b => b.draw());
                player.draw();
                
                activeCoins.forEach(c => { c.update(); c.draw(); });
                activeCoins = activeCoins.filter(c => c.life > 0);
                
                updateParticles();

                // Ground Line
                ctx.fillStyle = "#111"; ctx.fillRect(0, 390, canvas.width, 10);
                ctx.fillStyle = "#39ff14"; ctx.fillRect(0, 390, canvas.width, 2);

                frames++;
            }

            requestAnimationFrame(animate);
        }

        // Controls
        window.addEventListener("keydown", (e) => { 
            if (keys.hasOwnProperty(e.code)) { e.preventDefault(); keys[e.code] = true; }
            if (e.code === "Escape" && gameState === "PLAYING") { totalCoins += runCoins; showMenu(); }
        });
        window.addEventListener("keyup", (e) => { 
            if (keys.hasOwnProperty(e.code)) keys[e.code] = false; 
        });

        // Init
        document.getElementById("totalCoinsUI").innerText = totalCoins;
        animate();
    </script>
</body>
</html>
