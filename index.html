<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Awesome Game Hub</title>
    <style>
        :root {
            --bg-color: #0f0f13;
            --card-bg: #1e1e24;
            --accent: #7c3aed; /* Purple gamer accent */
            --accent-hover: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Header / Navbar */
        header {
            background-color: var(--card-bg);
            padding: 20px 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Main Content Container */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            margin-bottom: 20px;
            font-size: 24px;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }

        /* Game Grid Layout */
        .game-grid {
            display: grid;
            /* Auto-fit makes the grid responsive to screen size */
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        /* Individual Game Card */
        .game-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: var(--text-main);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border: 2px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.4);
            border-color: var(--accent);
        }

        .game-thumbnail {
            width: 100%;
            height: 150px;
            object-fit: cover;
            background-color: #333;
        }

        .game-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .game-title {
            margin: 0 0 10px 0;
            font-size: 18px;
        }

        .play-btn {
            background-color: var(--accent);
            color: white;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .game-card:hover .play-btn {
            background-color: var(--accent-hover);
        }

    </style>
</head>
<body>

    <header>
        <h1>🎮 My Arcade Hub</h1>
        <div style="color: var(--text-muted); font-size: 14px;">Playing on GitHub Pages</div>
    </header>

    <div class="container">
        <h2 class="section-title">Trending Games</h2>
        
        <div id="game-grid" class="game-grid">
            </div>
    </div>

    <script>
        // --- GAME DATABASE ---
        // This is a list of all your games. To add a new game, just add a new block inside this list!
        const gamesList = [
            {
                title: "Flappy Bird",
                thumbnail: "https://placehold.co/400x250/FFD700/000?text=Flappy+Bird", // A placeholder image
                url: "flappy.html" // Links to the file you renamed earlier
            },
            {
                title: "Snake Game",
                thumbnail: "https://placehold.co/400x250/32CD32/FFF?text=Snake",
                url: "#" // Replace '#' with 'snake.html' when you make one
            },
            {
                title: "Tetris Clone",
                thumbnail: "https://placehold.co/400x250/3b82f6/FFF?text=Tetris",
                url: "#"
            },
            {
                title: "Space Invaders",
                thumbnail: "https://placehold.co/400x250/111/FFF?text=Space+Invaders",
                url: "#"
            },
            {
                title: "Tic-Tac-Toe",
                thumbnail: "https://placehold.co/400x250/ff4c4c/FFF?text=Tic-Tac-Toe",
                url: "#"
            },
            {
                title: "Memory Match",
                thumbnail: "https://placehold.co/400x250/a855f7/FFF?text=Memory",
                url: "#"
            }
        ];

        // --- RENDER GAMES TO SCREEN ---
        const gridContainer = document.getElementById('game-grid');

        gamesList.forEach(game => {
            // Create the card element
            const card = document.createElement('a');
            card.href = game.url;
            card.className = 'game-card';

            // Build the inside of the card using the database info
            card.innerHTML = `
                <img src="${game.thumbnail}" alt="${game.title}" class="game-thumbnail">
                <div class="game-info">
                    <h3 class="game-title">${game.title}</h3>
                    <div class="play-btn">Play Now</div>
                </div>
            `;

            // Add the card to the grid
            gridContainer.appendChild(card);
        });
    </script>

</body>
</html>
