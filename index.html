<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Security Scan</title>
<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-size: 24px;
  text-align: center;
}

#terminal {
  padding: 20px;
  font-size: 20px;
  white-space: pre-line;
  display: none;
}

#bigWarning {
  position: fixed;
  top: 30%;
  width: 100%;
  text-align: center;
  font-size: 60px;
  color: red;
  display: none;
  animation: blink 0.5s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

#closeBtn {
  position: fixed;
  top: 10px;
  right: 10px;
  background: red;
  color: white;
  border: none;
  padding: 12px;
  font-size: 16px;
  cursor: pointer;
  display: none;
}
</style>
</head>
<body>

<div id="startScreen">
  <p>Click to start security scan</p>
  <button onclick="startPrank()">Start</button>
</div>

<div id="terminal"></div>
<div id="bigWarning">⚠ VIRUS DETECTED ⚠</div>
<button id="closeBtn" onclick="endPrank()">X</button>

<script>
function startPrank() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("terminal").style.display = "block";

  // Try fullscreen (user-initiated, so allowed)
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  }

  typeLine();
  setTimeout(showWarning, 8000);
  setTimeout(endReveal, 20000);
}

let lines = [
  "Initializing system scan...",
  "Accessing core files...",
  "Scanning for threats...",
  "Threat detected!",
  "Attempting removal...",
  "Removal failed...",
  "Uploading data...",
  "Encrypting device...",
  "Granting remote access...",
  "System compromised..."
];

let i = 0;

function typeLine() {
  if (i < lines.length) {
    document.getElementById("terminal").innerHTML += lines[i] + "\n";
    i++;
    setTimeout(typeLine, 1200);
  }
}

function showWarning() {
  document.getElementById("bigWarning").style.display = "block";
}

function endReveal() {
  document.getElementById("terminal").innerHTML += "\n\n😂 JUST KIDDING!";
  document.getElementById("closeBtn").style.display = "block";
}

function endPrank() {
  if (document.exitFullscreen) {
    document.exitFullscreen();
  }
  document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:20%;'>You're safe 😄</h1>";
}
</script>

</body>
</html>
