<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiju Web Brawler: Final Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Teko', sans-serif; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.8); color: #fff; z-index: 10; }
        .hidden { display: none !important; }
        
        h1 { font-size: 90px; margin: 0; color: #fff; text-shadow: 4px 4px 0 #E52521; text-transform: uppercase; line-height: 1; }
        p { font-size: 28px; margin-bottom: 20px; color: #ddd; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 5; box-shadow: 0 0 5px #000; }

        .health-container { position: absolute; top: 20px; width: 350px; height: 35px; background: #222; border: 4px solid #000; z-index: 5; }
        .health-fill { height: 100%; transition: width 0.1s; }
        #player-health-bar { left: 20px; }
        #player-health-fill { background: #39ff14; width: 100%; }
        #enemy-health-bar { right: 20px; }
        #enemy-health-fill { background: #E52521; width: 100%; float: right; }
        .health-label { position: absolute; top: -30px; font-size: 28px; color: #fff; text-shadow: 2px 2px 0 #000; }

        .controls-hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 22px; text-shadow: 2px 2px 0 #000; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 5px; text-align: center; z-index: 5; }

        button { background: #E52521; color: #fff; border: 4px solid #fff; padding: 15px 40px; font-size: 32px; font-family: 'Teko', sans-serif; cursor: pointer; text-transform: uppercase; box-shadow: 4px 4px 0 #000; transition: 0.1s; pointer-events: auto; }
        button:hover { background: #fff; color: #E52521; transform: translateY(-4px); box-shadow: 4px 8px 0 #000; }
    </style>
</head>
<body>
    <div id="game-hud" class="hidden">
        <div id="crosshair"></div>
        <div id="player-health-bar" class="health-container">
            <div class="health-label" style="left: 0;">YOU (KAIJU ALPHA)</div>
            <div id="player-health-fill"></div>
        </div>
        <div id="enemy-health-bar" class="health-container">
            <div class="health-label" style="right: 0;">ENEMY TITAN</div>
            <div id="enemy-health-fill"></div>
        </div>
        <div class="controls-hint">
            [W A S D] Move &nbsp;|&nbsp; [MOUSE] Look<br>
            [LEFT CLICK] Punch &nbsp;|&nbsp; [RIGHT CLICK] Atomic Breath
        </div>
    </div>

    <div id="start-screen" class="ui-layer">
        <h1>KAIJU WEB BRAWLER</h1>
        <p>DAYTIME ARENA COMBAT</p>
        <button onclick="startGame()">ENTER ARENA</button>
    </div>

    <script>
        // --- SCENE SETUP (Bright & Clear) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Bright blue sky
        
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Bright Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(200, 500, 200);
        scene.add(sun);

        // Arena Floor
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(1500, 1500), 
            new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 1 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- GLOBAL VARIABLES ---
        let gameState = "MENU";
        let player, enemy, cameraPivot;
        let playerHp = 1000, enemyHp = 1000;
        let keys = { w: false, a: false, s: false, d: false };
        let particles = [], beams = [];
        let playerPunching = false, punchTimer = 0;
        let breathCooldown = 0, enemyCooldown = 0;

        // --- KAIJU FACTORY ---
        function createKaiju(colorHex, glowHex) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.8 });
            const glow = new THREE.MeshBasicMaterial({ color: glowHex });

            // Body
            const body = new THREE.Mesh(new THREE.BoxGeometry(16, 24, 16), mat);
            body.position.y = 12; group.add(body);

            // Head
            const head = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 12), mat);
            head.position.set(0, 29, -4); group.add(head);

            // Tail
            const tail = new THREE.Mesh(new THREE.BoxGeometry(8, 8, 30), mat);
            tail.position.set(0, 6, 15); group.add(tail);

            // Spikes
            for(let i=0; i<3; i++) {
                let spike = new THREE.Mesh(new THREE.ConeGeometry(3, 10, 4), glow);
                spike.position.set(0, 22 - (i*6), 6 + (i*4));
                spike.rotation.x = -Math.PI/4;
                group.add(spike);
            }

            // Right Arm (For Punching)
            const rightArm = new THREE.Group();
            rightArm.position.set(10, 20, 0);
            const armMesh = new THREE.Mesh(new THREE.BoxGeometry(6, 18, 6), mat);
            armMesh.position.set(0, -6, 0); // Offset so it rotates from shoulder
            rightArm.add(armMesh);
            group.add(rightArm);
            group.userData.arm = rightArm; // Store reference

            return group;
        }

        // --- INITIALIZE PLAYERS ---
        player = createKaiju(0x222222, 0x0088ff);
        scene.add(player);

        enemy = createKaiju(0x661111, 0xffaa00);
        scene.add(enemy);

        // --- CAMERA SETUP (True 3rd Person) ---
        cameraPivot = new THREE.Group();
        cameraPivot.position.set(0, 25, 0); // Shoulder height
        player.add(cameraPivot);
        cameraPivot.add(camera);
        camera.position.set(10, 15, 45); // Over the right shoulder, zoomed in
        camera.lookAt(0, 5, -100);

        // --- BUILDINGS (City) ---
        let buildings = [];
        for (let i = 0; i < 40; i++) {
            let w = 20 + Math.random() * 30;
            let d = 20 + Math.random() * 30;
            let h = 40 + Math.random() * 80;
            let mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: 0x888888 }));
            let x = (Math.random() - 0.5) * 1000;
            let z = (Math.random() - 0.5) * 1000;
            if(Math.abs(x) < 100 && Math.abs(z) < 100) continue; // Clear center
            mesh.position.set(x, h/2, z);
            scene.add(mesh);
            buildings.push({ mesh: mesh, hp: 100 });
        }

        // --- CONTROLS ---
        document.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        document.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
        
        document.addEventListener('mousedown', e => {
            if(gameState !== "PLAYING" || document.pointerLockElement !== document.body) return;
            if(e.button === 0 && !playerPunching) performPunch(player, true); // Left Click = Punch
            if(e.button === 2 && breathCooldown <= 0) performBreath(player, 0x0088ff, true); // Right Click = Breath
        });
        
        document.addEventListener('contextmenu', e => e.preventDefault()); // Stop right-click menu

        document.addEventListener('mousemove', e => { 
            if (document.pointerLockElement === document.body && gameState === "PLAYING") {
                player.rotation.y -= e.movementX * 0.003;
                cameraPivot.rotation.x -= e.movementY * 0.003;
                cameraPivot.rotation.x = Math.max(-0.6, Math.min(0.6, cameraPivot.rotation.x)); // Clamp look up/down
            }
        });

        // --- COMBAT LOGIC ---
        function performPunch(attacker, isPlayer) {
            attacker.userData.isPunching = true;
            attacker.userData.punchTimer = 15;
            
            // Damage Check directly in front
            let forward = new THREE.Vector3(0, 0, -1).applyQuaternion(attacker.quaternion);
            let punchHitbox = attacker.position.clone().add(forward.multiplyScalar(20)); // Reach
            
            let target = isPlayer ? enemy : player;
            if(target.position.distanceTo(punchHitbox) < 30) {
                if(isPlayer) enemyHp -= 50; else playerHp -= 50;
                spawnParticles(target.position, 0xff0000, 10);
                updateUI();
            }
        }

        function performBreath(attacker, color, isPlayer) {
            if(isPlayer) breathCooldown = 40;
            
            let spawnPos = new THREE.Vector3(0, 30, -6);
            attacker.localToWorld(spawnPos);
            
            let forward = new THREE.Vector3(0, 0, -1);
            if(isPlayer) {
                // Aim exactly where camera is looking
                let camForward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.getWorldQuaternion(new THREE.Quaternion()));
                forward.copy(camForward);
            } else {
                forward.applyQuaternion(attacker.quaternion);
            }

            let dist = 600;
            let target = isPlayer ? enemy : player;
            
            // Simple Raycast
            let ray = new THREE.Raycaster(spawnPos, forward);
            let hits = ray.intersectObjects([target.children[0], ...buildings.map(b=>b.mesh)]);
            
            if(hits.length > 0) {
                dist = hits[0].distance;
                let hitObj = hits[0].object;
                
                if(hitObj.parent === target) {
                    if(isPlayer) enemyHp -= 80; else playerHp -= 80;
                    updateUI();
                } else {
                    let b = buildings.find(x => x.mesh === hitObj);
                    if(b) {
                        b.hp -= 100;
                        if(b.hp <= 0) { b.mesh.visible = false; spawnParticles(b.mesh.position, 0x888888, 20); }
                    }
                }
                spawnParticles(hits[0].point, color, 15);
            }

            // Draw Beam
            let beamGeo = new THREE.CylinderGeometry(4, 4, dist, 12);
            beamGeo.translate(0, dist/2, 0); beamGeo.rotateX(Math.PI/2);
            let beam = new THREE.Mesh(beamGeo, new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.9 }));
            beam.position.copy(spawnPos);
            
            // Aim beam
            let lookPt = spawnPos.clone().add(forward);
            beam.lookAt(lookPt);
            
            scene.add(beam);
            beams.push({ mesh: beam, life: 5 });
        }

        function spawnParticles(pos, color, amt) {
            for(let i=0; i<amt; i++) {
                let p = new THREE.Mesh(new THREE.BoxGeometry(3,3,3), new THREE.MeshBasicMaterial({color: color}));
                p.position.copy(pos); scene.add(p);
                particles.push({ mesh: p, life: 1.0, vx: (Math.random()-0.5)*12, vy: Math.random()*15, vz: (Math.random()-0.5)*12 });
            }
        }

        function updateUI() {
            if(playerHp < 0) playerHp = 0; if(enemyHp < 0) enemyHp = 0;
            document.getElementById("player-health-fill").style.width = (playerHp / 1000 * 100) + "%";
            document.getElementById("enemy-health-fill").style.width = (enemyHp / 1000 * 100) + "%";
            
            if(playerHp <= 0) { document.exitPointerLock(); alert("YOU DIED!"); location.reload(); }
            if(enemyHp <= 0) { enemy.position.set(0, -1000, 0); alert("ENEMY DEFEATED! YOU WIN!"); }
        }

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            if (gameState === "PLAYING") {
                
                if(breathCooldown > 0) breathCooldown--;

                // --- PLAYER MOVEMENT ---
                let speed = 1.5;
                let moveZ = Number(keys.s) - Number(keys.w);
                let moveX = Number(keys.d) - Number(keys.a);
                if (moveZ !== 0 || moveX !== 0) {
                    let forwardVec = new THREE.Vector3(0, 0, 1).applyQuaternion(player.quaternion);
                    let rightVec = new THREE.Vector3(1, 0, 0).applyQuaternion(player.quaternion);
                    player.position.add(forwardVec.multiplyScalar(moveZ * speed));
                    player.position.add(rightVec.multiplyScalar(moveX * speed));
                    player.rotation.z = Math.sin(Date.now() * 0.01) * 0.03; // Walk wobble
                } else {
                    player.rotation.z = 0;
                }

                // --- ARM ANIMATIONS ---
                [player, enemy].forEach(k => {
                    if(k.userData.isPunching) {
                        k.userData.punchTimer--;
                        // Swing arm forward then back
                        if(k.userData.punchTimer > 7) k.userData.arm.rotation.x -= 0.3;
                        else k.userData.arm.rotation.x += 0.3;
                        
                        if(k.userData.punchTimer <= 0) {
                            k.userData.isPunching = false;
                            k.userData.arm.rotation.x = 0;
                        }
                    }
                });

                // --- ENEMY AI ---
                if(enemyHp > 0) {
                    let dist = enemy.position.distanceTo(player.position);
                    let targetPos = player.position.clone(); targetPos.y = enemy.position.y;
                    enemy.lookAt(targetPos);

                    if(dist > 40) {
                        enemy.translateZ(1.2); // Walk forward
                        enemy.rotation.z = Math.sin(Date.now() * 0.01) * 0.03;
                    } else {
                        enemy.rotation.z = 0;
                        // Punch if close
                        if(!enemy.userData.isPunching && Math.random() < 0.05) performPunch(enemy, false);
                    }

                    // Shoot Breath randomly if far
                    enemyCooldown--;
                    if(dist > 100 && dist < 400 && enemyCooldown <= 0 && Math.random() < 0.02) {
                        performBreath(enemy, 0xffaa00, false);
                        enemyCooldown = 60;
                    }
                }

                // --- PHYSICS UPDATES ---
                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i]; p.vy -= 0.8; // Gravity
                    p.mesh.position.x += p.vx; p.mesh.position.y += p.vy; p.mesh.position.z += p.vz;
                    p.life -= 0.03;
                    if (p.life <= 0 || p.mesh.position.y < 0) { scene.remove(p.mesh); particles.splice(i, 1); }
                }

                for(let i = beams.length - 1; i >= 0; i--) {
                    beams[i].life--;
                    if(beams[i].life <= 0) { scene.remove(beams[i].mesh); beams.splice(i, 1); }
                }
            }
            renderer.render(scene, camera);
        }

        // --- MENU LOGIC ---
        function startGame() {
            document.body.requestPointerLock();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-hud').classList.remove('hidden');
            player.position.set(0, 0, 200); enemy.position.set(0, 0, -200);
            gameState = "PLAYING";
        }

        document.addEventListener('pointerlockchange', () => { 
            if (document.pointerLockElement !== document.body && gameState === "PLAYING") {
                gameState = "MENU";
                document.getElementById('start-screen').classList.remove('hidden');
                document.getElementById('game-hud').classList.add('hidden');
            }
        });

        window.addEventListener('resize', () => { 
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
        });

        animate();
    </script>
</body>
</html>
