<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>System Alert</title>
<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: monospace;
}

.popup {
  position: absolute;
  width: 200px;
  padding: 10px;
  background: #111;
  color: lime;
  border: 1px solid lime;
  font-size: 14px;
}
</style>
</head>
<body>

<script>
let messages = [
  "Scanning files...",
  "Warning: suspicious process",
  "Downloading update...",
  "Firewall bypassed",
  "System error detected",
  "Uploading logs...",
  "Encrypting cache..."
];

function createPopup() {
  let div = document.createElement("div");
  div.className = "popup";
  div.innerText = messages[Math.floor(Math.random() * messages.length)];

  div.style.top = Math.random() * window.innerHeight + "px";
  div.style.left = Math.random() * window.innerWidth + "px";

  document.body.appendChild(div);

  setTimeout(() => {
    div.remove();
  }, 4000);
}

// skapa popups varje sekund
setInterval(createPopup, 800);

// stoppa efter 20 sek och avslöja skämt
setTimeout(() => {
  document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:20%;'>😂 JUST A SIMULATION</h1>";
}, 20000);
</script>

</body>
</html>
