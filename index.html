<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kaiju Simulator: Ultra Realism</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Press Start 2P', monospace; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.85); color: #fff; z-index: 10; backdrop-filter: blur(5px); }
        .hidden { display: none !important; }
        
        h1 { font-size: 40px; margin: 0 0 15px 0; color: #fff; text-shadow: 4px 4px 0 #E52521, -2px -2px 0 #555; text-align: center; }
        p { font-size: 14px; margin-bottom: 25px; color: #aaa; text-align: center; line-height: 1.5; }
        
        .hud { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: flex-start; color: #fff; font-size: 16px; pointer-events: none; z-index: 5; text-shadow: 2px 2px 0 #000; }
        .hud-left { display: flex; flex-direction: column; gap: 10px; }
        .hud-coins { color: #F6D305; font-size: 20px; text-shadow: 0 0 10px rgba(246, 211, 5, 0.5); }
        
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; pointer-events: none; z-index: 5; display: none; }
        #crosshair::after { content: ''; position: absolute; top: 8px; left: 8px; width: 4px; height: 4px; background: rgba(255,0,0,0.8); border-radius: 50%; box-shadow: 0 0 5px red; }

        button { background: #000; color: #fff; border: 4px solid #fff; padding: 15px 25px; font-size: 16px; font-family: 'Press Start 2P', monospace; cursor: pointer; text-transform: uppercase; margin: 10px; box-shadow: 4px 4px 0 #555; transition: 0.1s; pointer-events: auto; }
        button:hover { background: #fff; color: #000; box-shadow: 4px 4px 0 #E52521; transform: translateY(-2px); }
        .btn-shop { border-color: #F6D305; color: #F6D305; box-shadow: 4px 4px 0 #A88F00; }
        .btn-shop:hover { background: #F6D305; color: #000; }
        
        #shop-content { display: flex; gap: 20px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; width: 90%; max-width: 800px; }
        .shop-item { background: #111; border: 4px solid #555; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; font-size: 12px; width: 200px; text-align: center; }
        .shop-item.equipped { border-color: #39ff14; background: #1a221a; box-shadow: inset 0 0 20px rgba(57, 255, 20, 0.2); }
        .buy-btn { font-size: 12px; padding: 10px 15px; margin: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div class="hud hidden" id="game-hud">
        <div class="hud-left">
            <div>CITY DESTROYED: <span id="scoreUI">0</span></div>
            <div class="hud-coins">COINS: <span id="coinUI">0</span></div>
        </div>
        <div style="text-align: right; font-size: 12px; color: #aaa; line-height: 1.5; background: rgba(0,0,0,0.5); padding: 10px; border: 1px solid #333;">
            [ESC] TO PAUSE/SHOP<br><br>
            [MOUSE] LOOK AROUND<br>
            [W A S D] TO WALK<br>
            [CLICK] MOVIE ABILITY
        </div>
    </div>

    <div id="start-screen" class="ui-layer">
        <h1>3D KAIJU<br>SIMULATOR</h1>
        <p>Total DNA Coins: <span id="totalCoinsUI" style="color:#F6D305;">0</span></p>
        <div>
            <button onclick="startGame()">ENTER CITY</button>
            <button class="btn-shop" onclick="showShop()">DNA LAB</button>
        </div>
    </div>

    <div id="shop-screen" class="ui-layer hidden">
        <h2 style="color: #F6D305; margin: 0 0 15px 0; text-shadow: 2px 2px 0 #000;">DNA LAB</h2>
        <p style="color: #F6D305;">COINS: <span id="shopCoinUI">0</span></p>
        <div id="shop-content"></div>
        <button onclick="showMenu()">BACK TO MENU</button>
    </div>

    <script>
        // --- SAVE DATA ---
        let totalCoins = parseInt(localStorage.getItem("k3d_real_coins")) || 0;
        let unlockedKaijus = JSON.parse(localStorage.getItem("k3d_real_unlocked")) || ["Gojira 1954"];
        let equippedKaiju = localStorage.getItem("k3d_real_equipped") || "Gojira 1954";
        let runCoins = 0; let score = 0; let gameState = "MENU";

        function updateSave() {
            localStorage.setItem("k3d_real_coins", totalCoins);
            localStorage.setItem("k3d_real_unlocked", JSON.stringify(unlockedKaijus));
            localStorage.setItem("k3d_real_equipped", equippedKaiju);
            document.getElementById("totalCoinsUI").innerText = totalCoins;
            document.getElementById("shopCoinUI").innerText = totalCoins;
        }

        const kaijuDex = {
            "Gojira 1954": { cost: 0, height: 40, speed: 1.5, power: 20, color: 0x222222, metal: 0.1, rough: 0.8, beamColor: 0x0088ff, type: "classic", desc: "Classic Atomic Vapor" },
            "Mecha-Gojira": { cost: 300, height: 45, speed: 2.5, power: 35, color: 0x888899, metal: 0.9, rough: 0.3, beamColor: 0xff0000, type: "mech", desc: "Rapid Finger Missiles" },
            "Shin Gojira": { cost: 800, height: 55, speed: 1.0, power: 100, color: 0x1a0505, metal: 0.2, rough: 0.5, beamColor: 0xaa00ff, type: "shin", desc: "Piercing Photon Ray" }
        };

        // --- THREE.JS SETUP WITH REALISM TWEAKS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.FogExp2(0x020205, 0.002); // Dense cinematic fog

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1500);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Soft shadows
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x111122, 1.5); // Dark blue ambient
        scene.add(ambientLight);
        
        const moonLight = new THREE.DirectionalLight(0xaaccff, 1.5); // Pale moonlight
        moonLight.position.set(200, 300, 200);
        moonLight.castShadow = true;
        moonLight.shadow.mapSize.width = 2048;
        moonLight.shadow.mapSize.height = 2048;
        moonLight.shadow.camera.near = 0.5;
        moonLight.shadow.camera.far = 1000;
        moonLight.shadow.camera.left = -300;
        moonLight.shadow.camera.right = 300;
        moonLight.shadow.camera.top = 300;
        moonLight.shadow.camera.bottom = -300;
        moonLight.shadow.bias = -0.001;
        scene.add(moonLight);

        const rimLight = new THREE.DirectionalLight(0xff5500, 0.5); // Orange city glow from below/side
        rimLight.position.set(-200, 50, -200);
        scene.add(rimLight);

        // Procedural Ground Texture
        const groundCanvas = document.createElement('canvas'); groundCanvas.width = 512; groundCanvas.height = 512;
        const gCtx = groundCanvas.getContext('2d');
        gCtx.fillStyle = '#0a0a0c'; gCtx.fillRect(0,0,512,512);
        for(let i=0; i<5000; i++) { gCtx.fillStyle = Math.random()>0.5?'#111':'#050505'; gCtx.fillRect(Math.random()*512, Math.random()*512, 2, 2); }
        const groundTex = new THREE.CanvasTexture(groundCanvas);
        groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping; groundTex.repeat.set(50, 50);

        const groundGeo = new THREE.PlaneGeometry(3000, 3000);
        const groundMat = new THREE.MeshStandardMaterial({ map: groundTex, roughness: 0.9, metalness: 0.1 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- PROCEDURAL BUILDING TEXTURE ---
        function createBuildingTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0a0a0c'; ctx.fillRect(0, 0, 256, 512);
            for(let x=10; x<246; x+=25) {
                for(let y=10; y<502; y+=30) {
                    if(Math.random() > 0.4) {
                        ctx.fillStyle = Math.random() > 0.8 ? '#ffffaa' : (Math.random() > 0.5 ? '#aaccff' : '#222233'); // Lights
                        ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
                        ctx.fillRect(x, y, 15, 20);
                        ctx.shadowBlur = 0;
                    }
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }
        const buildingTex = createBuildingTexture();

        // --- PLAYER (THIRD PERSON) ---
        let playerGroup = new THREE.Group();
        scene.add(playerGroup);

        function buildKaijuModel() {
            while(playerGroup.children.length > 0){ playerGroup.remove(playerGroup.children[0]); }
            
            let stats = kaijuDex[equippedKaiju];
            // Physical material reacts beautifully to light
            let mat = new THREE.MeshPhysicalMaterial({ color: stats.color, metalness: stats.metal, roughness: stats.rough, clearcoat: 0.2 });
            let spikeMat = new THREE.MeshStandardMaterial({ color: stats.beamColor, emissive: stats.beamColor, emissiveIntensity: 0.5 });

            let bodyGeo = new THREE.BoxGeometry(12, 24, 16); let body = new THREE.Mesh(bodyGeo, mat);
            body.position.y = 15; body.castShadow = true; playerGroup.add(body);

            let headGeo = new THREE.BoxGeometry(8, 8, 12); let head = new THREE.Mesh(headGeo, mat);
            head.position.set(0, 30, -8); head.castShadow = true; playerGroup.add(head);

            let tailGeo = new THREE.BoxGeometry(8, 6, 25); let tail = new THREE.Mesh(tailGeo, mat);
            tail.position.set(0, 8, 18); tail.castShadow = true; playerGroup.add(tail);

            let legGeo = new THREE.BoxGeometry(6, 15, 8);
            let legL = new THREE.Mesh(legGeo, mat); legL.position.set(-8, 7.5, 0); legL.castShadow = true; playerGroup.add(legL);
            let legR = new THREE.Mesh(legGeo, mat); legR.position.set(8, 7.5, 0); legR.castShadow = true; playerGroup.add(legR);

            for(let i=0; i<3; i++) {
                let spikeGeo = new THREE.ConeGeometry(3, 10, 4);
                let spike = new THREE.Mesh(spikeGeo, spikeMat);
                spike.position.set(0, 25 - (i*6), 6 + (i*5)); spike.rotation.x = -Math.PI/4;
                playerGroup.add(spike);
            }
        }

        // --- GAME OBJECTS ---
        let buildings = []; let particles = []; let projectiles = []; let coins = [];

        function generateCity() {
            buildings.forEach(b => scene.remove(b.mesh)); buildings = [];
            coins.forEach(c => scene.remove(c.mesh)); coins = [];
            
            const buildingGeo = new THREE.BoxGeometry(1, 1, 1);

            for (let i = 0; i < 400; i++) {
                let w = 15 + Math.random() * 25; let d = 15 + Math.random() * 25; let h = 40 + Math.random() * 120;
                let x = (Math.random() - 0.5) * 1200; let z = (Math.random() - 0.5) * 1200;
                
                if (Math.abs(x) < 80 && Math.abs(z) < 80) continue; // Clear spawn

                let bMat = new THREE.MeshStandardMaterial({ map: buildingTex, roughness: 0.6, metalness: 0.2 });
                let bTexClone = buildingTex.clone(); bTexClone.needsUpdate = true;
                bTexClone.repeat.set(w/20, h/20); bMat.map = bTexClone; // Scale windows properly

                let mesh = new THREE.Mesh(buildingGeo, bMat);
                mesh.position.set(x, h/2, z); mesh.scale.set(w, h, d);
                mesh.castShadow = true; mesh.receiveShadow = true;
                scene.add(mesh);
                buildings.push({ mesh: mesh, hp: w * h / 50, maxHp: w * h / 50, h: h, w: w, d: d });
            }
        }

        // --- CONTROLS & PHYSICS ---
        let keys = { w: false, a: false, s: false, d: false }; let direction = new THREE.Vector3();
        let isFiring = false; let fireCooldown = 0; let camShake = 0;

        document.addEventListener('keydown', (e) => { if(gameState === "PLAYING" && keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        document.addEventListener('keyup', (e) => { if(gameState === "PLAYING" && keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
        document.addEventListener('mousedown', () => { if(gameState === "PLAYING" && document.pointerLockElement === document.body) isFiring = true; });
        document.addEventListener('mouseup', () => { isFiring = false; });
        document.addEventListener('mousemove', (e) => { if (document.pointerLockElement === document.body && gameState === "PLAYING") playerGroup.rotation.y -= e.movementX * 0.003; });
        document.addEventListener('pointerlockchange', () => { if (document.pointerLockElement !== document.body && gameState === "PLAYING") { totalCoins += runCoins; updateSave(); showMenu(); }});

        // --- WEAPONS / ABILITIES ---
        function fireAbility() {
            let stats = kaijuDex[equippedKaiju];
            let spawnPos = playerGroup.position.clone(); spawnPos.y += 30; 
            let forward = new THREE.Vector3(0, 0, -1).applyQuaternion(playerGroup.quaternion);
            
            if (stats.type === "classic" && fireCooldown <= 0) {
                camShake = 2;
                for(let i=0; i<5; i++) {
                    let proj = new THREE.Mesh(new THREE.BoxGeometry(6,6,6), new THREE.MeshBasicMaterial({color: stats.beamColor, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.8}));
                    proj.position.copy(spawnPos);
                    let dir = forward.clone(); dir.x += (Math.random()-0.5)*0.4; dir.y += (Math.random()-0.5)*0.4; 
                    scene.add(proj);
                    projectiles.push({mesh: proj, vel: dir.multiplyScalar(6), life: 40, power: stats.power/2});
                    
                    // Light follow
                    let light = new THREE.PointLight(stats.beamColor, 2, 100); proj.add(light);
                }
                fireCooldown = 5;
            } 
            else if (stats.type === "mech" && fireCooldown <= 0) {
                camShake = 1;
                let proj = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 8), new THREE.MeshStandardMaterial({color: 0x333333, emissive: stats.beamColor, emissiveIntensity: 2}));
                proj.position.copy(spawnPos); proj.quaternion.copy(playerGroup.quaternion); proj.rotateX(Math.PI/2);
                scene.add(proj);
                projectiles.push({mesh: proj, vel: forward.clone().multiplyScalar(12), life: 50, power: stats.power});
                let light = new THREE.PointLight(stats.beamColor, 2, 50); proj.add(light);
                fireCooldown = 6;
            }
            else if (stats.type === "shin" && fireCooldown <= 0) {
                camShake = 5;
                let raycaster = new THREE.Raycaster(spawnPos, forward);
                let intersects = raycaster.intersectObjects(buildings.map(b => b.mesh));
                
                const mat = new THREE.LineBasicMaterial({ color: stats.beamColor, linewidth: 10, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
                const pts = [spawnPos, spawnPos.clone().add(forward.clone().multiplyScalar(1000))];
                const geo = new THREE.BufferGeometry().setFromPoints(pts);
                const line = new THREE.Line(geo, mat);
                scene.add(line);
                
                let flash = new THREE.PointLight(stats.beamColor, 5, 500);
                flash.position.copy(spawnPos); scene.add(flash);

                setTimeout(() => { scene.remove(line); scene.remove(flash); }, 200);

                intersects.forEach(hit => {
                    let b = buildings.find(bld => bld.mesh === hit.object);
                    if(b) damageBuilding(b, stats.power * 2);
                });
                fireCooldown = 40;
            }
        }

        function damageBuilding(b, amount) {
            b.hp -= amount;
            b.mesh.material.emissive.setHex(0xffaa00);
            setTimeout(() => { if(b.hp > 0) b.mesh.material.emissive.setHex(0x000000); }, 100);
            spawnParticles(b.mesh.position, 0x333333, 3, false); // Smoke

            if (b.hp <= 0 && b.mesh.visible) {
                b.mesh.visible = false;
                score++; document.getElementById("scoreUI").innerText = score;
                camShake = 8;
                
                spawnParticles(b.mesh.position, 0xff5500, 20, true); // Fire explosion
                spawnParticles(b.mesh.position, 0x222222, 30, false); // Debris
                
                let explosionLight = new THREE.PointLight(0xff4400, 5, 200);
                explosionLight.position.copy(b.mesh.position); scene.add(explosionLight);
                setTimeout(() => scene.remove(explosionLight), 500);
                
                let amt = Math.floor(b.maxHp / 10) + 1;
                for(let i=0; i<amt; i++) {
                    let cmesh = new THREE.Mesh(new THREE.BoxGeometry(4,4,4), new THREE.MeshStandardMaterial({color: 0xF6D305, metalness: 1.0, roughness: 0.2, emissive: 0xaa8800}));
                    cmesh.position.copy(b.mesh.position); cmesh.position.y = 2;
                    cmesh.position.x += (Math.random()-0.5)*30; cmesh.position.z += (Math.random()-0.5)*30;
                    scene.add(cmesh); coins.push({mesh: cmesh});
                }
            }
        }

        function spawnParticles(pos, color, amt, glow) {
            let mat = glow ? 
                new THREE.MeshBasicMaterial({color: color, transparent: true, blending: THREE.AdditiveBlending}) : 
                new THREE.MeshStandardMaterial({color: color, roughness: 0.9});
            
            for(let i=0; i<amt; i++) {
                let s = Math.random() * 4 + 2;
                let p = new THREE.Mesh(new THREE.BoxGeometry(s,s,s), mat);
                p.position.copy(pos);
                if(!glow) p.castShadow = true;
                scene.add(p);
                particles.push({ mesh: p, life: 1.0, vx: (Math.random()-0.5)*6, vy: Math.random()*8 + 2, vz: (Math.random()-0.5)*6 });
            }
        }

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (gameState === "PLAYING") {
                let stats = kaijuDex[equippedKaiju];
                if (fireCooldown > 0) fireCooldown--;
                if (isFiring) fireAbility();

                direction.z = Number(keys.s) - Number(keys.w);
                direction.x = Number(keys.d) - Number(keys.a);
                direction.normalize();

                if (direction.z !== 0 || direction.x !== 0) {
                    let rightVec = new THREE.Vector3(1, 0, 0).applyQuaternion(playerGroup.quaternion);
                    let forwardVec = new THREE.Vector3(0, 0, 1).applyQuaternion(playerGroup.quaternion);
                    playerGroup.position.add(forwardVec.multiplyScalar(direction.z * stats.speed));
                    playerGroup.position.add(rightVec.multiplyScalar(direction.x * stats.speed));
                    playerGroup.rotation.z = Math.sin(Date.now() * 0.01) * 0.03; // Heavy walk wobble
                    
                    if(Math.random() < 0.05) camShake = 1.5; // Stomp shake
                } else { playerGroup.rotation.z = 0; }

                // Cinematic Camera Follow
                let cameraOffset = new THREE.Vector3(0, 50, 120); 
                cameraOffset.applyMatrix4(playerGroup.matrixWorld);
                camera.position.lerp(cameraOffset, 0.08); 
                
                let lookTarget = playerGroup.position.clone(); lookTarget.y += 25; 
                camera.lookAt(lookTarget);

                if(camShake > 0) {
                    camera.position.x += (Math.random()-0.5)*camShake;
                    camera.position.y += (Math.random()-0.5)*camShake;
                    camShake *= 0.8;
                    if(camShake < 0.1) camShake = 0;
                }

                // Collisions
                let px = playerGroup.position.x; let pz = playerGroup.position.z;
                buildings.forEach(b => {
                    if (b.hp > 0 && Math.abs(b.mesh.position.x - px) < b.w/2 + 8 && Math.abs(b.mesh.position.z - pz) < b.d/2 + 8) damageBuilding(b, stats.power * 0.5); 
                });

                for (let i = coins.length - 1; i >= 0; i--) {
                    let c = coins[i]; c.mesh.rotation.y += 0.05; c.mesh.rotation.x += 0.05;
                    if (playerGroup.position.distanceTo(c.mesh.position) < 50) {
                        runCoins++; document.getElementById("coinUI").innerText = runCoins;
                        scene.remove(c.mesh); coins.splice(i, 1);
                    }
                }

                for (let i = projectiles.length - 1; i >= 0; i--) {
                    let p = projectiles[i]; p.mesh.position.add(p.vel); p.life--;
                    let hit = false;
                    for(let j=0; j<buildings.length; j++) {
                        let b = buildings[j];
                        if (b.hp > 0 && Math.abs(b.mesh.position.x - p.mesh.position.x) < b.w/2 && Math.abs(b.mesh.position.z - p.mesh.position.z) < b.d/2 && p.mesh.position.y < b.h) {
                            damageBuilding(b, p.power); hit = true; break;
                        }
                    }
                    if (hit || p.life <= 0) { scene.remove(p.mesh); projectiles.splice(i, 1); }
                }

                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i]; p.vy -= 0.15; // gravity
                    p.mesh.position.x += p.vx; p.mesh.position.y += p.vy; p.mesh.position.z += p.vz;
                    p.life -= 0.02;
                    if(p.mesh.material.transparent) p.mesh.material.opacity = p.life; // Fade fire
                    if (p.life <= 0 || p.mesh.position.y < 0) { scene.remove(p.mesh); particles.splice(i, 1); }
                }
            }
            renderer.render(scene, camera);
        }

        // --- UI ROUTING ---
        function hideAll() { document.querySelectorAll('.ui-layer, .hud, #crosshair').forEach(e => e.classList.add('hidden')); document.getElementById('crosshair').style.display = 'none'; }
        function showMenu() { document.exitPointerLock(); gameState = "MENU"; updateSave(); hideAll(); document.getElementById("start-screen").classList.remove("hidden"); camera.position.set(0, 200, 400); camera.lookAt(0,0,0); }
        function showShop() {
            hideAll(); document.getElementById("shop-screen").classList.remove("hidden"); let html = "";
            for (let k in kaijuDex) {
                let d = kaijuDex[k]; let isUn = unlockedKaijus.includes(k); let isEq = equippedKaiju === k;
                let btn = isEq ? `<button class="buy-btn" disabled style="background:#39ff14;color:#000;">DNA ACTIVE</button>` : 
                          isUn ? `<button class="buy-btn" onclick="equip('${k}')">SELECT MUTATION</button>` : 
                          `<button class="buy-btn" ${totalCoins >= d.cost ? '' : 'disabled'} onclick="buy('${k}', ${d.cost})">INJECT ${d.cost} COINS</button>`;
                html += `<div class="shop-item ${isEq ? 'equipped' : ''}"><div style="font-size:14px; color:#fff;">${k}</div><div style="font-size:10px; color:#F6D305;">${d.desc}</div><div style="font-size:8px; color:#aaa;">POW: ${d.power} | SPD: ${d.speed}</div>${btn}</div>`;
            }
            document.getElementById("shop-content").innerHTML = html;
        }

        function buy(k, cost) { if(totalCoins >= cost) { totalCoins -= cost; unlockedKaijus.push(k); equippedKaiju = k; updateSave(); showShop(); } }
        function equip(k) { equippedKaiju = k; updateSave(); showShop(); }

        function startGame() {
            document.body.requestPointerLock();
            hideAll(); document.getElementById("game-hud").classList.remove("hidden");
            document.getElementById("crosshair").style.display = "block";
            gameState = "PLAYING"; runCoins = 0; score = 0; camShake = 0;
            document.getElementById("scoreUI").innerText = "0"; document.getElementById("coinUI").innerText = "0";
            playerGroup.position.set(0, 0, 0); playerGroup.rotation.set(0, 0, 0);
            buildKaijuModel(); generateCity();
        }

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        updateSave(); showMenu(); animate();
    </script>
</body>
</html>
