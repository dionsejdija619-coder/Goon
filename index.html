<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>System Scan</title>
<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

#terminal {
  padding: 20px;
  font-size: 18px;
  white-space: pre-line;
  display: none;
}

#progress {
  position: fixed;
  bottom: 0;
  left: 0;
  height: 5px;
  background: lime;
  width: 0%;
}

#closeBtn {
  position: fixed;
  top: 10px;
  right: 10px;
  background: red;
  color: white;
  border: none;
  padding: 10px;
  display: none;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="startScreen">
  <h2>System Security Check</h2>
  <button onclick="start()">Start Scan</button>
</div>

<div id="terminal"></div>
<div id="progress"></div>
<button id="closeBtn" onclick="endPrank()">X</button>

<script>
let lines = [
  "[INFO] Initializing security modules...",
  "[OK] Kernel access granted",
  "[SCAN] Checking system files...",
  "[SCAN] Checking browser data...",
  "[WARNING] Suspicious activity detected",
  "[ACTION] Attempting isolation...",
  "[FAILED] Isolation failed",
  "[DOWNLOAD] Downloading security patch...",
  "[DOWNLOAD] 12%...",
  "[DOWNLOAD] 47%...",
  "[DOWNLOAD] 83%...",
  "[ERROR] Patch corrupted",
  "[UPLOAD] Sending diagnostics...",
  "[BREACH] External access detected",
  "[CRITICAL] System integrity compromised"
];

let i = 0;

function start() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("terminal").style.display = "block";

  typeLine();
  progressBar();
  setTimeout(reveal, 20000);
}

function typeLine() {
  if (i < lines.length) {
    document.getElementById("terminal").innerHTML += lines[i] + "\n";
    i++;
    setTimeout(typeLine, 1000);
  }
}

function progressBar() {
  let width = 0;
  let bar = document.getElementById("progress");
  let interval = setInterval(() => {
    if (width >= 100) {
      clearInterval(interval);
    } else {
      width++;
      bar.style.width = width + "%";
    }
  }, 200);
}

function reveal() {
  document.getElementById("terminal").innerHTML += "\n\n😂 JUST KIDDING - NOTHING HAPPENED";
  document.getElementById("closeBtn").style.display = "block";
}

function endPrank() {
  document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:20%;'>All safe 😄</h1>";
}
</script>

</body>
</html>
