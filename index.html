<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Systemvarning</title>
<style>
body {
  background-color: black;
  color: lime;
  font-family: monospace;
  overflow: hidden;
}
#content {
  padding: 20px;
  font-size: 18px;
}
#closeBtn {
  position: fixed;
  top: 10px;
  right: 10px;
  background: red;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  display: none;
}
</style>
</head>
<body>

<button id="closeBtn" onclick="endPrank()">X</button>

<div id="content"></div>

<script>
let text = [
  "Initierar systemskanning...",
  "Åtkomst till filer...",
  "Laddar upp data...",
  "Krypterar system...",
  "Skickar till server..."
];

let i = 0;
function typeLine() {
  if (i < text.length) {
    document.getElementById("content").innerHTML += text[i] + "<br>";
    i++;
    setTimeout(typeLine, 1000);
  } else {
    document.getElementById("content").innerHTML += "<br>SKOJAR BARA 😄";
    document.getElementById("closeBtn").style.display = "block";
  }
}

function endPrank() {
  document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:20%;'>Du överlevde 😄</h1>";
}

typeLine();
</script>

</body>
</html>
